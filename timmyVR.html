<!DOCTYPE html>
<html>
<head>
    <title>Timmy VR Camera</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .eye {
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="eye">
        <video id="leftVideo" autoplay playsinline></video>
    </div>

    <div class="eye">
        <video id="rightVideo" autoplay playsinline></video>
    </div>

<script>
const leftVideo = document.getElementById("leftVideo");
const rightVideo = document.getElementById("rightVideo");

navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
})
.then(stream => {
    leftVideo.srcObject = stream;
    rightVideo.srcObject = stream;
})
.catch(error => {
    alert("Camera access failed: " + error);
});
</script>

</body>
</html>
