<!DOCTYPE html>
<html>
<head>
    <title>Timmy VR Camera</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .eye {
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

<div class="eye">
    <video id="leftVideo" autoplay playsinline></video>
</div>

<div class="eye">
    <video id="rightVideo" autoplay playsinline></video>
</div>

<script>
async function startCamera() {
    try {
        console.log("Starting camera...");

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        document.getElementById("leftVideo").srcObject = stream;
        document.getElementById("rightVideo").srcObject = stream;

        console.log("Camera success!");

    } catch (err) {
        console.error(err);
        alert("Camera failed: " + err.message);
    }
}

startCamera();
</script>

</body>
</html>
